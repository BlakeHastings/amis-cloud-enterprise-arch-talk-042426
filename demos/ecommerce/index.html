<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sally's Tech Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container">
      <div class="header-inner">
        <div class="brand">
          <span class="brand-icon">🛍️</span>
          <div>
            <h1>Sally's Tech Shop</h1>
            <p>Gear for developers</p>
          </div>
        </div>
        <button class="cart-btn" id="cartBtn" onclick="toggleCart()">
          🛒 Cart <span class="cart-count" id="cartCount">0</span>
        </button>
      </div>
    </div>
  </header>

  <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
  <aside class="cart-panel" id="cartPanel">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button class="close-btn" onclick="toggleCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer" id="cartFooter"></div>
  </aside>

  <div class="modal-overlay" id="modalOverlay" onclick="closeCheckout()"></div>
  <div class="modal" id="checkoutModal">
    <div class="modal-header">
      <h2>Checkout</h2>
      <button class="close-btn" onclick="closeCheckout()">✕</button>
    </div>
    <form id="checkoutForm" onsubmit="submitOrder(event)">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="customerName" required placeholder="Jane Smith">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="customerEmail" required placeholder="jane@example.com">
      </div>
      <div class="order-summary" id="orderSummary"></div>
      <button type="submit" class="btn-primary" id="submitBtn">Place Order</button>
    </form>
  </div>

  <main>
    <div class="container">
      <div class="page-title">
        <h2>All Products</h2>
        <p id="productCount"></p>
      </div>
      <div class="product-grid" id="productGrid">
        <div class="loading">Loading products…</div>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <footer>
    <div class="container">
      <p>© 2026 Sally's Tech Shop · Powered by ☁️</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
